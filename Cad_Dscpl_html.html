<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Disciplinas</title>
    <link rel="stylesheet" href="Cad_Dscpl_Css.css">
</head>
<body>

<div class="container">

    <header class="header">
        Sistema de Alocação de Laboratórios - Cadastro
    </header>

    <div class="breadcrumb">
        Início > Disciplinas > <span>Novo Cadastro</span>
    </div>

    <div class="box">

        <h2>Cadastro de Disciplinas</h2>

        <!-- IDENTIFICAÇÃO -->
        <div class="card full">
            <h3>IDENTIFICAÇÃO</h3>

            <div class="grid-4">
                <input placeholder="Nome da disciplina *">
                <input placeholder="Código da disciplina *">
                <input placeholder="Turma *">
                <select><option>Coordenador responsável</option></select>
            </div>

            <div class="grid-4">
                <select><option>Curso *</option></select>
                <select><option>Período *</option></select>
                <select><option>Modalidade</option></select>
                <input placeholder="Carga horária semanal">
            </div>
        </div>

        <!-- SOFTWARES -->
        <div class="grid-main">

            <div class="card">
                <h3>REQUISITOS DE SOFTWARES</h3>

                <label>Aplicativos necessários *</label>

                <div class="tags">
                    <span>Visual Studio ✕</span>
                    <span>MongoDB ✕</span>
                    <input placeholder="Digitar e pressionar Enter...">
                </div>

                <div class="checkboxes">
                    <label><input type="checkbox" checked> Acesso à internet</label>
                    <label><input type="checkbox"> Projetor / TV</label>
                    <label><input type="checkbox" checked> Ar-condicionado</label>
                </div>
            </div>

            <!-- CAPACIDADE -->
            <div class="card">
                <h3>CAPACIDADE</h3>

                <label>Nº de alunos *</label>
                <div class="counter">
                    <button>-</button>
                    <span>20</span>
                    <button>+</button>
                </div>

                <p class="info">Computadores necessários: <strong>10</strong></p>
            </div>

        </div>

        <!-- HORÁRIOS -->
        <div class="grid-main">

            <div class="card">
                <h3>HORÁRIOS E DURAÇÃO</h3>

                <label>Dias da semana *</label>
                <div class="days">
                    <button>Seg</button>
                    <button>Ter</button>
                    <button class="active">Qua</button>
                    <button>Qui</button>
                    <button>Sex</button>
                </div>

                <div class="grid-4">
                    <input placeholder="Início">
                    <input placeholder="Fim">
                    <input placeholder="Duração">
                    <select><option>Semestre / Ano</option></select>
                </div>
            </div>

            <!-- OBS -->
            <div class="card">
                <h3>OBSERVAÇÕES</h3>
                <textarea placeholder="Informações adicionais..."></textarea>
            </div>

        </div>

        <!-- BOTÕES -->
        <div class="actions">
            <button class="secondary">Limpar</button>
            <button class="secondary">Cancelar</button>
            <button class="primary">Cadastrar Relatório</button>
        </div>

        <p class="required">* Campos obrigatórios</p>

    </div>

</div>

</body>
</html>
