<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tela de Login</title>
    <link rel="stylesheet" type="text/css" href="Login_Css.css">
    <link rel="stylesheet" href="Navbar.css">
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" href="Login_html.html">🖥️ Alocação de Labs</a>
    <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
    <div class="navbar-links" id="navLinks">
        <a href="Tela_Login.html" class="ativo">Login</a>
        <a href="Menu_html.html">Início</a>
        <a href="Alc_Lab_html.html">Alocação</a>
        <a href="Cad_Lab_html.html">Cad. Laboratório</a>
        <a href="Cad_Dscpl_html.html">Cad. Disciplina</a>
        <a href="Cadastro_Alunos.html">Cad. Alunos</a>
    </div>
</nav>

<div class="container">
    <header class="header">
        Sistema de Alocação de Laboratórios
    </header>

    <section class="login-box">
        <h2>Identificação do Usuário</h2>

        <form id="loginForm">
            <label>E-mail / Matrícula *</label>
            <input type="text" id="emailUsuario" placeholder="Digite seu e-mail ou matrícula" required>

            <label>Senha *</label>
            <input type="password" id="senhaUsuario" placeholder="Digite sua senha" required>

            <label>Perfil de Acesso *</label>
            <select id="perfilUsuario" required>
                <option value="">Selecionar...</option>
                <option value="1">Diretor Acadêmico</option>
                <option value="2">Professor</option>
                <option value="3">Aluno</option>
            </select>

            <div class="link">
                <a href="#">Esqueci minha senha</a>
            </div>

            <p class="aviso">* Campos obrigatórios</p>

            <div class="botao">
                <button type="submit">Acessar</button>
            </div>
        </form>
    </section>
</div>

<script src="Navbar.js"></script>

<script>
    const API_LOGIN_URL = 'http://localhost:5000/api/Usuario/Login';

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = document.getElementById('emailUsuario').value.trim();
        const senha = document.getElementById('senhaUsuario').value.trim();
        const perfilId = document.getElementById('perfilUsuario').value;

        if (!email || !senha || !perfilId) {
            alert("Por favor, preencha todos os campos obrigatórios.");
            return;
        }

        const payload = {
            EmailUsuario: email,
            SenhaUsuario: senha,
            IdPerfil: parseInt(perfilId)
        };

        try {
            const response = await fetch(API_LOGIN_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                // Inserção do código solicitado
                const data = await response.json();
                localStorage.setItem('perfilUsuario', data.perfil); // 1, 2 ou 3
                localStorage.setItem('idUsuario', data.idUsuario);   // O ID dele no banco
                localStorage.setItem('usuarioLogado', 'true');

                // Redireciona para o Menu Principal
                window.location.href = 'Menu_html.html';
            } else {
                alert("E-mail, senha ou perfil incorretos. Tente novamente.");
            }
        } catch (error) {
            console.error("Erro ao tentar fazer login:", error);
            alert("Falha de conexão com o servidor.");
        }
    });
</script>

</body>
</html>
