<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Tela de Login</title>
	<link rel="stylesheet" type="text/css" href="Login_Css.css">
</head>
<body>
		<div class="container">

        <!-- Cabeçalho -->
        <header class="header">
            <h1>Sistema de Alocação de Laboratórios</h1>
            
        </header>

        <!-- Formulário -->
        <div class="login-box">
            <h2>Identificação do Usuário</h2>

            <form action="">
                <label>E-mail / Matrícula *</label>
                <input type="text" placeholder="">

                <label>Senha *</label>
                <input type="password" placeholder="">

                <label>Perfil de Acesso *</label>
                <select>
                    <option>Selecionar...</option>
                    <option>Administrador</option>
                    <option>Professor</option>
                    <option>Aluno</option>
                </select>

                <div class="link">
                    <a href="#">Esqueci minha senha</a>
                </div>

                <p class="aviso">* Campos obrigatórios</p>

                <div class="botao">
    				<button type="submit">Acessar</button>
				</div>
            </form>
        </div>

        <!-- Rodapé -->
        <footer class="footer">
            Versão 1.0.0 | Suporte: suporte.ti@EinsteinLimeira.edu.br
        </footer>

    </div>

</body>

</body>
</html>
